name: Feature Request
description: Suggest an idea or improvement for DrawBell.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea that would make DrawBell better? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration that led to this request.
      placeholder: "e.g. I often snooze without realising because the doodle is too easy in the morning."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: "e.g. An option to increase difficulty automatically on consecutive snoozes."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Any other approaches or workarounds you thought of?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or any other details.
    validations:
      required: false
