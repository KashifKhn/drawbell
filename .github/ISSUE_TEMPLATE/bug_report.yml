name: Bug Report
description: Something in the app is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g. The alarm keeps ringing even after the drawing is accepted."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger the bug?
      placeholder: |
        1. Set an alarm for...
        2. When it rings, draw...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: "e.g. The alarm should stop after the drawing is recognised."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: "e.g. The alarm continues ringing and shows 'Try again'."
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "e.g. 1.0.1"
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: "e.g. Android 14 (API 34)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: "e.g. Samsung Galaxy S23, Pixel 7"
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty setting when the bug occurred
      options:
        - Easy
        - Medium
        - Hard
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Any additional context or screenshots
      description: Paste crash logs, screenshots, or screen recordings if available.
    validations:
      required: false
