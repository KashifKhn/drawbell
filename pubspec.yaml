name: drawbell
description: "DrawBell - Draw to dismiss your alarm"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  tflite_flutter: ^0.12.0
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  just_audio: ^0.9.42
  wakelock_plus: ^1.2.8
  vibration: ^2.0.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_bg_orange_square.png"
  adaptive_icon_background: "#d94a09"
  adaptive_icon_foreground: "assets/images/logo_png_white_adaptive.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#d94a09"
  image: "assets/images/logo_png_white.png"
  android: true
  ios: false
  android_12:
    color: "#d94a09"
    image: "assets/images/logo_png_white_square.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/quickdraw_model.tflite
    - assets/labels.txt
